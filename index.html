<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pentangle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --yellow:  #eddf0c;
      --green:   #039b4f;
      --orange:  #f99505;
      --red:     #f55926;
      --blue:    #2221fe;
      --pink:    #fe76f2;
      --purple:  #c961f5;
      --bg:      #ffffff;
      --surface: #f5f5f5;
      --border:  rgba(0,0,0,0.1);
      --text:    #1a1a1a;
      --muted:   rgba(0,0,0,0.45);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", sans-serif;
      font-weight: 300;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── LAYOUT ── */
    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 680px;
      width: 100%;
      margin: 0 auto;
      padding: 0 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── HEADER ── */
    header {
      padding: 0;
      text-align: center;
      animation: fadeUp 0.8s ease both;
    }

    /* ── BACKGROUND LOGO ── */
    .bg-logo {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 0;
      pointer-events: none;
    }

    .bg-logo img {
      width: 100vmin;
      height: 100vmin;
      display: block;
    }

    h1 {
      font-weight: 600;
      font-size: clamp(2.4rem, 8vw, 3.6rem);
      letter-spacing: -0.05em;
      line-height: 1.05;
color: #000;
    }

    .tagline {
      font-size: 1.8rem;
      max-width: 440px;
	font-weight: 400;
      margin: 0 auto 40px;
letter-spacing: -0.02em;
    }

    /* ── APP STORE BUTTON ── */
    .store-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: var(--text);
      border: 1px solid var(--text);
      color: #fff;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 14px;
      font-family: 'Open Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
    }
    .store-btn:hover {
      background: #333;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }

    .store-btn svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }
    .store-btn-text span { display: block; }
    .store-btn-text .small { font-size: 0.68rem; font-weight: 300; opacity: 0.75; }
    .store-btn-text .big  { font-size: 1rem; font-weight: 700; }


    /* ── CONTENT ── */
    .content {
      text-align: center;
	padding: 20px;
    }


    /* ── FOOTER ── */
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px;
      text-align: center;
      z-index: 1;
      animation: fadeUp 0.8s ease 0.4s both;
    }

    footer p {
      font-size: 0.78rem;
      color: var(--muted);
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="bg-logo">
    <img src="Pentangle_logo-colour.svg" alt="" aria-hidden="true" />
  </div>

  <div class="wrapper">

    <header>
      <h1>Pentangle</h1>
      <span class="tagline">culture in common</span>
    </header>

	<div class="content">
<a href="#" class="store-btn" aria-label="Download on the App Store">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
        </svg>
        <span class="store-btn-text">
          <span class="small">Download on the</span>
          <span class="big">App Store</span>
        </span>
      </a>
</div>

    <footer>
      <p><a href="mailto:hello@pentangle.app">hello@pentangle.app</a><br>&copy; 2026 Pentangle</p>
    </footer>

  </div>

</body>
</html>
